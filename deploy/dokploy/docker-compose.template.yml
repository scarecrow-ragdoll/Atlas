# FILE: deploy/dokploy/docker-compose.template.yml
# VERSION: 1.0.0
# START_MODULE_CONTRACT
#   PURPOSE: Define the Dokploy production compose template for API, public web, and bot images.
#   SCOPE: Owns deploy-time service wiring and env placeholders; excludes local compose and CI env mutation logic.
#   DEPENDS: API_IMAGE, WEB_IMAGE, BOT_IMAGE, WEB_API_BASE_URL, ADMIN_SESSION_KEY_SECRET, Dokploy runtime secrets.
#   LINKS: M-CI-CD / M-WEB / V-M-CI-CD.
#   ROLE: CONFIG
#   MAP_MODE: SUMMARY
# END_MODULE_CONTRACT
# START_MODULE_MAP
#   api - Runs the production API image with database, Redis, admin bootstrap/session, and server env placeholders.
#   web - Runs the public Next web image with WEB_API_BASE_URL runtime proxy config.
#   bot - Runs the production bot image.
# END_MODULE_MAP
# START_CHANGE_SUMMARY
#   LAST_CHANGE: 1.0.1 - Replaced bearer placeholder env with web-admin bootstrap and session env.
# END_CHANGE_SUMMARY

services:
  api:
    image: ${API_IMAGE}
    pull_policy: always
    restart: unless-stopped
    environment:
      SERVER_PORT: '8080'
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_SSLMODE: ${POSTGRES_SSLMODE:-disable}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      ADMIN_INITIAL_EMAIL: ${ADMIN_INITIAL_EMAIL}
      ADMIN_INITIAL_PASSWORD: ${ADMIN_INITIAL_PASSWORD}
      ADMIN_INITIAL_NAME: ${ADMIN_INITIAL_NAME}
      ADMIN_ORIGINS: ${ADMIN_ORIGINS}
      ADMIN_SESSION_COOKIE_NAME: ${ADMIN_SESSION_COOKIE_NAME:-web_admin_session}
      ADMIN_SESSION_TTL: ${ADMIN_SESSION_TTL:-168h}
      ADMIN_SESSION_COOKIE_SECURE: ${ADMIN_SESSION_COOKIE_SECURE:-auto}
      ADMIN_SESSION_SAME_SITE: ${ADMIN_SESSION_SAME_SITE:-Lax}
      ADMIN_SESSION_KEY_SECRET: ${ADMIN_SESSION_KEY_SECRET}
      SERVER_ENV: ${SERVER_ENV:-production}
    expose:
      - '8080'

  web:
    image: ${WEB_IMAGE}
    pull_policy: always
    restart: unless-stopped
    environment:
      PORT: '3000'
      WEB_API_BASE_URL: ${WEB_API_BASE_URL}
    depends_on:
      - api
    expose:
      - '3000'

  bot:
    image: ${BOT_IMAGE}
    pull_policy: always
    restart: unless-stopped
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
    depends_on:
      - api
