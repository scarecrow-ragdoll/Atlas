# FILE: apps/api/internal/atlas/graph/schema/nutrition.graphql
# VERSION: 1.0.0
# START_MODULE_CONTRACT
#   PURPOSE: Define GraphQL types, enums, inputs, queries, mutations, and union result types for WAVE-05 Nutrition module.
#   SCOPE: NutritionProduct, NutritionTemplate (with nested items), DailyNutritionOverride (with nested items), NutritionMacros, and weekly template apply result types. Operation and NutritionErrorCode enums. CRUD inputs and union results with ValidationError/NotFoundError/AuthError for all entities.
#   DEPENDS: schema.graphql for Time and Date scalars, Query and Mutation root types.
#   ROLE: RUNTIME
#   MAP_MODE: LOCALS
# END_MODULE_CONTRACT
# START_CHANGE_SUMMARY
#   LAST_CHANGE: 1.0.1 - Added weekly template apply enum/result types for factual daily nutrition seeding.
# END_CHANGE_SUMMARY

type NutritionProduct {
  id: ID!
  userId: ID!
  name: String!
  caloriesPer100g: Float!
  proteinPer100g: Float!
  fatPer100g: Float!
  carbsPer100g: Float!
  notes: String
  isActive: Boolean!
  createdAt: Time!
  updatedAt: Time!
}

type NutritionTemplate {
  id: ID!
  userId: ID!
  weekStartDate: Date!
  title: String
  notes: String
  items: [NutritionTemplateItem!]!
  createdAt: Time!
  updatedAt: Time!
}

type NutritionTemplateItem {
  id: ID!
  templateId: ID!
  productId: ID!
  amountGrams: Float!
  mealLabel: String
  notes: String
  createdAt: Time!
  updatedAt: Time!
}

type DailyNutritionOverride {
  id: ID!
  userId: ID!
  date: Date!
  notes: String
  items: [DailyNutritionOverrideItem!]!
  createdAt: Time!
  updatedAt: Time!
}

type DailyNutritionOverrideItem {
  id: ID!
  overrideId: ID!
  productId: ID!
  amountGrams: Float!
  operation: Operation!
  mealLabel: String
  notes: String
  createdAt: Time!
  updatedAt: Time!
}

type NutritionMacros {
  calories: Float!
  protein: Float!
  fat: Float!
  carbs: Float!
}

enum Operation {
  ADD
  SUBTRACT
  REPLACE
}

enum NutritionErrorCode {
  VALIDATION_ERROR
  NOT_FOUND
  AUTH_ERROR
  INTERNAL_ERROR
}

enum NutritionTemplateApplyMode {
  SEED_EMPTY_DAYS
}

input CreateProductInput {
  name: String!
  caloriesPer100g: Float!
  proteinPer100g: Float!
  fatPer100g: Float!
  carbsPer100g: Float!
  notes: String
}

input UpdateProductInput {
  name: String
  caloriesPer100g: Float
  proteinPer100g: Float
  fatPer100g: Float
  carbsPer100g: Float
  notes: String
}

input CreateTemplateInput {
  weekStartDate: Date!
  title: String
  notes: String
}

input UpdateTemplateInput {
  title: String
  notes: String
}

input CreateTemplateItemInput {
  templateId: ID!
  productId: ID!
  amountGrams: Float!
  mealLabel: String
  notes: String
}

input UpdateTemplateItemInput {
  amountGrams: Float
  mealLabel: String
  notes: String
}

input CreateOverrideInput {
  date: Date!
  notes: String
}

input UpdateOverrideInput {
  notes: String
}

input CreateOverrideItemInput {
  overrideId: ID!
  productId: ID!
  amountGrams: Float!
  operation: Operation!
  mealLabel: String
  notes: String
}

input UpdateOverrideItemInput {
  amountGrams: Float
  operation: Operation
  mealLabel: String
  notes: String
}

type NutritionProductResult {
  nutritionProduct: NutritionProduct
  validationError: NutritionValidationError
  notFoundError: NutritionNotFoundError
  authError: NutritionAuthError
}

type NutritionProductsResult {
  products: [NutritionProduct!]!
  validationError: NutritionValidationError
  authError: NutritionAuthError
}

type NutritionTemplateResult {
  nutritionTemplate: NutritionTemplate
  validationError: NutritionValidationError
  notFoundError: NutritionNotFoundError
  authError: NutritionAuthError
}

type NutritionTemplatesResult {
  templates: [NutritionTemplate!]!
  validationError: NutritionValidationError
  authError: NutritionAuthError
}

type NutritionTemplateItemResult {
  nutritionTemplateItem: NutritionTemplateItem
  validationError: NutritionValidationError
  notFoundError: NutritionNotFoundError
  authError: NutritionAuthError
}

type DailyNutritionOverrideResult {
  dailyNutritionOverride: DailyNutritionOverride
  validationError: NutritionValidationError
  notFoundError: NutritionNotFoundError
  authError: NutritionAuthError
}

type DailyNutritionOverridesResult {
  overrides: [DailyNutritionOverride!]!
  validationError: NutritionValidationError
  authError: NutritionAuthError
}

type DailyNutritionOverrideItemResult {
  dailyNutritionOverrideItem: DailyNutritionOverrideItem
  validationError: NutritionValidationError
  notFoundError: NutritionNotFoundError
  authError: NutritionAuthError
}

type NutritionMacrosResult {
  macros: NutritionMacros
  validationError: NutritionValidationError
  authError: NutritionAuthError
}

type NutritionTemplateApplyDateResult {
  date: Date!
  status: String!
  entryCount: Int!
  reason: String
}

type NutritionTemplateApplyResult {
  weekStartDate: Date
  weekEndDate: Date
  mode: NutritionTemplateApplyMode
  dates: [NutritionTemplateApplyDateResult!]!
  validationError: NutritionValidationError
  notFoundError: NutritionNotFoundError
  authError: NutritionAuthError
}

type NutritionValidationError {
  message: String!
  code: NutritionErrorCode!
}

type NutritionNotFoundError {
  message: String!
  code: NutritionErrorCode!
}

type NutritionAuthError {
  message: String!
  code: NutritionErrorCode!
}
