type CardioEntry {
  id: ID!
  userId: ID!
  dailyLogId: ID!
  cardioType: CardioType!
  durationMinutes: Int!
  avgPulse: Int
  heartRateZone: HeartRateZone
  notes: String
  createdAt: Time!
  updatedAt: Time!
}

enum CardioType {
  WALKING
  RUNNING
  TREADMILL
  BIKE
  ELLIPTICAL
  STAIRS
  ROWING
  OTHER
}

enum HeartRateZone {
  UNKNOWN
  ZONE_1
  ZONE_2
  ZONE_3
  ZONE_4
  ZONE_5
}

input CreateCardioInput {
  date: Date!
  cardioType: CardioType!
  durationMinutes: Int!
  avgPulse: Int
  heartRateZone: HeartRateZone
  notes: String
}

input UpdateCardioInput {
  cardioType: CardioType
  durationMinutes: Int
  avgPulse: Int
  heartRateZone: HeartRateZone
  notes: String
}

type CardioEntryResult {
  cardioEntry: CardioEntry
  validationError: CardioValidationError
  notFoundError: CardioNotFoundError
  authError: CardioAuthError
}

type CardioEntriesResult {
  entries: [CardioEntry!]!
  validationError: CardioValidationError
  authError: CardioAuthError
}

type CardioValidationError {
  message: String!
  code: CardioErrorCode!
}

type CardioNotFoundError {
  message: String!
  code: CardioErrorCode!
}

type CardioAuthError {
  message: String!
  code: CardioErrorCode!
}

enum CardioErrorCode {
  VALIDATION_ERROR
  NOT_FOUND
  AUTH_ERROR
  INTERNAL_ERROR
}