scalar Time
scalar Date

type Query {
  settings: SettingsResult!
  exercises(first: Int = 20, after: String, includeInactive: Boolean = false): ExerciseConnection!
  exercise(id: ID!): ExerciseResult!
  allExercises(includeInactive: Boolean = false): [Exercise!]!

  # WAVE-04 Cardio
  cardioEntry(id: ID!): CardioEntryResult!
  cardioEntries(date: Date!): CardioEntriesResult!

  # WAVE-04 Body Weight
  bodyWeightEntry(id: ID!): BodyWeightResult!
  bodyWeightEntries(from: Date!, to: Date!): BodyWeightEntriesResult!
  latestBodyWeight: BodyWeightResult!

  # WAVE-04 Check-in
  bodyCheckIn(id: ID!): BodyCheckInResult!
  bodyCheckIns(from: Date!, to: Date!): BodyCheckInsResult!

  # WAVE-04 Measurements
  bodyMeasurements(checkInId: ID!): [BodyMeasurement!]!

  # WAVE-04 Progress Photos
  progressPhotos(checkInId: ID!): ProgressPhotosResult!

  # WAVE-04 Week Flags
  weekFlags(weekStartDate: Date!): WeekFlagsResult!

  # WAVE-05 Nutrition
  nutritionProducts: NutritionProductsResult!
  nutritionProduct(id: ID!): NutritionProductResult!
  nutritionTemplates(startDate: Date!, endDate: Date!): NutritionTemplatesResult!
  nutritionTemplate(id: ID!): NutritionTemplateResult!
  nutritionTemplateCurrent(weekStartDate: Date!): NutritionTemplateResult!
  dailyNutritionOverrides(startDate: Date!, endDate: Date!): DailyNutritionOverridesResult!
  dailyNutritionOverride(id: ID!): DailyNutritionOverrideResult!
  dailyNutritionOverrideByDate(date: Date!): DailyNutritionOverrideResult!
  nutritionMacros(weekStartDate: Date!, date: Date): NutritionMacrosResult!
}

type Mutation {
  updateSettings(input: SettingsInput!): SettingsResult!
  enablePin(input: PinEnableInput!): PinOperationResult!
  disablePin(input: PinDisableInput!): PinOperationResult!
  changePin(input: PinChangeInput!): PinOperationResult!
  createExercise(input: CreateExerciseInput!): ExerciseResult!
  updateExercise(id: ID!, input: UpdateExerciseInput!): ExerciseResult!
  archiveExercise(id: ID!): ArchiveResult!
  restoreExercise(id: ID!): ArchiveResult!

  # WAVE-04 Cardio
  createCardioEntry(input: CreateCardioInput!): CardioEntryResult!
  updateCardioEntry(id: ID!, input: UpdateCardioInput!): CardioEntryResult!
  deleteCardioEntry(id: ID!): CardioEntryResult!

  # WAVE-04 Body Weight
  createBodyWeightEntry(input: CreateBodyWeightInput!): BodyWeightResult!
  updateBodyWeightEntry(id: ID!, input: UpdateBodyWeightInput!): BodyWeightResult!
  deleteBodyWeightEntry(id: ID!): BodyWeightResult!

  # WAVE-04 Check-in
  createBodyCheckIn(input: CreateCheckInInput!): BodyCheckInResult!
  updateBodyCheckIn(id: ID!, input: UpdateCheckInInput!): BodyCheckInResult!
  deleteBodyCheckIn(id: ID!): BodyCheckInResult!

  # WAVE-04 Measurements
  createBodyMeasurement(checkInId: ID!, input: CreateMeasurementInput!): BodyMeasurementResult!
  updateBodyMeasurement(id: ID!, input: UpdateMeasurementInput!): BodyMeasurementResult!
  deleteBodyMeasurement(id: ID!): BodyMeasurementResult!

  # WAVE-04 Week Flags
  createWeekFlag(input: CreateWeekFlagInput!): WeekFlagResult!
  deleteWeekFlag(id: ID!): WeekFlagResult!

  # WAVE-05 Nutrition
  createNutritionProduct(input: CreateProductInput!): NutritionProductResult!
  updateNutritionProduct(id: ID!, input: UpdateProductInput!): NutritionProductResult!
  deleteNutritionProduct(id: ID!): NutritionProductResult!
  createNutritionTemplate(input: CreateTemplateInput!): NutritionTemplateResult!
  updateNutritionTemplate(id: ID!, input: UpdateTemplateInput!): NutritionTemplateResult!
  deleteNutritionTemplate(id: ID!): NutritionTemplateResult!
  createNutritionTemplateItem(input: CreateTemplateItemInput!): NutritionTemplateItemResult!
  updateNutritionTemplateItem(id: ID!, input: UpdateTemplateItemInput!): NutritionTemplateItemResult!
  deleteNutritionTemplateItem(id: ID!): NutritionTemplateItemResult!
  createDailyNutritionOverride(input: CreateOverrideInput!): DailyNutritionOverrideResult!
  updateDailyNutritionOverride(id: ID!, input: UpdateOverrideInput!): DailyNutritionOverrideResult!
  deleteDailyNutritionOverride(id: ID!): DailyNutritionOverrideResult!
  createDailyNutritionOverrideItem(input: CreateOverrideItemInput!): DailyNutritionOverrideItemResult!
  updateDailyNutritionOverrideItem(id: ID!, input: UpdateOverrideItemInput!): DailyNutritionOverrideItemResult!
  deleteDailyNutritionOverrideItem(id: ID!): DailyNutritionOverrideItemResult!
}