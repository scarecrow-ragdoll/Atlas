#
# FILE: apps/api/config/config.yml
# VERSION: 1.0.1
# START_MODULE_CONTRACT
#   PURPOSE: Provide default local development configuration for the Go API.
#   SCOPE: Defines server, CORS, logging, PostgreSQL, Redis, admin origins, admin session cookie defaults, and pagination defaults; excludes production secret management.
#   DEPENDS: apps/api/cmd/server/main.go, libs/go/config, docker/docker-compose.dev.yml.
#   LINKS: M-API / V-M-API / VF-LOCAL-DEV.
#   ROLE: CONFIG
#   MAP_MODE: SUMMARY
# END_MODULE_CONTRACT
# START_MODULE_MAP
#   server - Local API bind port, environment, timeout, and CORS defaults.
#   postgres - Local development database connection defaults.
#   redis - Local development Redis connection defaults.
# END_MODULE_MAP
# START_CHANGE_SUMMARY
#   LAST_CHANGE: 1.0.2 - Replaced placeholder bearer auth config with env-only admin auth surfaces.
# END_CHANGE_SUMMARY

server:
  port: 8090
  read_timeout: 10s
  write_timeout: 30s
  shutdown_timeout: 5s
  env: development
  cors_origins:
    - "http://localhost:3100"
    - "http://127.0.0.1:3100"
    - "http://localhost:3101"
    - "http://127.0.0.1:3101"

log:
  level: info
  format: json

postgres:
  host: localhost
  port: 7501
  user: app
  password: secret
  db: monorepo_dev
  sslmode: disable
  max_conns: 10
  min_conns: 2
  max_conn_idle_time: 30m

redis:
  host: localhost
  port: 7502

admin:
  origins:
    - "http://localhost:3100"
    - "http://127.0.0.1:3100"

admin_session:
  cookie_name: web_admin_session
  ttl: 168h
  cookie_secure: auto
  same_site: Lax

pagination:
  default_page_size: 20
  max_page_size: 100

atlas_pin:
  argon2_memory: 65536
  argon2_iterations: 3
  argon2_parallelism: 2
  argon2_key_length: 32
  min_length: 4
  max_length: 20

atlas_pin_session:
  cookie_name: atlas_pin_session
  idle_ttl: 8h
  absolute_ttl: 168h
  cookie_secure: auto
  same_site: Lax

atlas_pin_attempt:
  max_failures: 5
  lockout_duration: 5m
  escalated_duration: 30m

media:
  base_path: ./data/media
  max_upload_size: 314572800

ai_export:
  base_path: ./data/exports
  max_range_days: 365
  max_photos_in_export: 20
  max_export_size_bytes: 104857600
