# FILE: apps/api/.golangci.yml
# VERSION: 1.0.0
# START_MODULE_CONTRACT
#   PURPOSE: Configure Go linting and formatting checks for the API application.
#   SCOPE: golangci-lint runtime, enabled linters, formatter settings, and generated-file exclusions; excludes source behavior and coverage policy.
#   DEPENDS: golangci-lint, apps/api Go packages.
#   LINKS: M-API / V-M-API / WAVE-03.
#   ROLE: CONFIG
#   MAP_MODE: SUMMARY
# END_MODULE_CONTRACT
# START_MODULE_MAP
#   linters - Enables API lint checks and generated-file exclusions.
#   formatters - Enables goimports with generated-file exclusions.
# END_MODULE_MAP
# START_CHANGE_SUMMARY
#   LAST_CHANGE: 1.0.0 - Added GRACE contract and lax generated-file exclusions for gqlgen/sqlc output.
# END_CHANGE_SUMMARY

version: "2"

run:
  timeout: 5m

linters:
  exclusions:
    generated: lax
    paths:
      - internal/graph/generated.go
      - internal/graph/model
      - internal/graph/admin_auth.resolvers.go
      - internal/graph/schema.resolvers.go
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosec
    - misspell
    - unconvert
  settings:
    gosec:
      excludes:
        - G117

formatters:
  exclusions:
    generated: lax
    paths:
      - internal/graph/generated.go
      - internal/graph/model
      - internal/graph/admin_auth.resolvers.go
      - internal/graph/schema.resolvers.go
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - monorepo-template
