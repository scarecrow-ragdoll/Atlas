#   PURPOSE: Define the admin GetUsers GraphQL operation for paginated user lists.
#   SCOPE: Owns the operation document imported by the Vite admin users route and GraphQL codegen; excludes runtime transport, schema ownership, and UI rendering.
#   DEPENDS: apps/api/internal/graph/schema.graphqls, tools/codegen/codegen.ts, apps/web-admin/src/pages/users-page.tsx.
#   LINKS: M-WEB-ADMIN / M-GRAPHQL-SCHEMA / V-M-WEB-ADMIN
#   ROLE: RUNTIME
#   MAP_MODE: SUMMARY
# END_MODULE_CONTRACT
# START_MODULE_MAP
#   GetUsers - Fetches paginated user edges, pageInfo, and totalCount for the admin users route.
# END_MODULE_MAP
# START_CHANGE_SUMMARY
#   LAST_CHANGE: 1.0.0 - Added file-local GRACE markup for Task 8 governance scan.
# END_CHANGE_SUMMARY

query GetUsers($first: Int, $after: String) {
  users(pagination: { first: $first, after: $after }) {
    edges {
      cursor
      node {
        id
        email
        name
        createdAt
      }
    }
    pageInfo {
      hasNextPage
      endCursor
    }
    totalCount
  }
}
