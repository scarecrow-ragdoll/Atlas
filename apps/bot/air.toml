root = "."
tmp_dir = "tmp"

[build]
  bin = "./tmp/bot"
  cmd = "go build -o ./tmp/bot ./cmd/bot"
  delay = 1000
  exclude_dir = ["tmp", "vendor", "node_modules"]
  exclude_regex = ["_test\\.go"]
  include_ext = ["go", "yml", "yaml"]
  kill_delay = "0s"
  send_interrupt = false
  stop_on_error = true

[log]
  time = false

[misc]
  clean_on_exit = true
